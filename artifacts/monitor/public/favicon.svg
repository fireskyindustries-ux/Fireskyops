<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" rx="36" fill="#111827"/>
  <!-- Tank body -->
  <rect x="52" y="44" width="76" height="92" rx="10" fill="#1f2937"/>
  <rect x="52" y="44" width="76" height="92" rx="10" stroke="#e85d04" stroke-width="4"/>
  <!-- Water fill (60%) -->
  <clipPath id="tank-clip">
    <rect x="54" y="46" width="72" height="88" rx="8"/>
  </clipPath>
  <rect x="54" y="90" width="72" height="44" fill="#0ea5e9" opacity="0.7" clip-path="url(#tank-clip)"/>
  <!-- Water surface ripple -->
  <path d="M54 90 Q72 86 90 90 Q108 94 126 90" stroke="#38bdf8" stroke-width="2.5" fill="none" clip-path="url(#tank-clip)"/>
  <!-- Tank cap/lid -->
  <rect x="70" y="36" width="40" height="12" rx="4" fill="#e85d04"/>
  <!-- Tank legs -->
  <rect x="64" y="132" width="10" height="16" rx="3" fill="#374151"/>
  <rect x="106" y="132" width="10" height="16" rx="3" fill="#374151"/>
  <!-- Level indicator line -->
  <line x1="130" y1="90" x2="138" y2="90" stroke="#e85d04" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="104" x2="138" y2="104" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>
  <line x1="130" y1="118" x2="138" y2="118" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>
</svg>
