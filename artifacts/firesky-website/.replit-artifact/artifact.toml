kind = "web"
previewPath = "/website/"
title = "Firesky Industries Website"
version = "1.0.0"
id = "artifacts/firesky-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/website/" ]
localPort = 18117

[services.development]
run = "pnpm --filter @workspace/firesky-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/firesky-website", "run", "build" ]
publicDir = "artifacts/firesky-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18117"
BASE_PATH = "/website/"
